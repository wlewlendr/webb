<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Music</title> 
<style>

.bg-anime{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(0.85);
}

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Poppins',sans-serif;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:30px 15px;
}
@keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.app{width:100%;max-width:1300px}
.header{text-align:center;margin-bottom:30px}
.header h1{font-size:30px;font-weight:700;background:linear-gradient(90deg,#22d3ee,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.player-layout{display:grid;grid-template-columns:380px 1fr;gap:30px}
.player-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(25px);border-radius:30px;padding:25px;box-shadow:0 25px 60px rgba(0,0,0,0.6)}
.cover{width:100%;border-radius:25px;margin-bottom:20px;box-shadow:0 20px 40px rgba(0,0,0,0.6)}
.song-title{font-size:20px;font-weight:600}
.song-artist{font-size:14px;color:#94a3b8;margin-bottom:10px}

.controls{display:flex;justify-content:center;align-items:center;gap:20px;margin:15px 0}
.controls button{background:linear-gradient(90deg,#22d3ee,#a78bfa);border:none;padding:10px 18px;border-radius:30px;cursor:pointer;font-weight:600;transition:0.3s}
.controls button:hover{transform:scale(1.1)}
.play-btn{width:65px;height:65px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center}

.time-display{display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-bottom:6px}
.progress{height:6px;background:#1e293b;border-radius:20px;overflow:hidden;margin-bottom:15px}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#22d3ee,#a78bfa)}

.lyrics-box{background:#0f172a;padding:18px;border-radius:20px;max-height:260px;overflow:auto;font-size:13px;line-height:1.6;white-space:pre-line;scroll-behavior:smooth}
.playlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.song-card{background:rgba(255,255,255,0.05);padding:10px;border-radius:16px;cursor:pointer;transition:0.3s}
.song-card:hover{transform:translateY(-6px);background:rgba(255,255,255,0.1)}
.song-card img{width:100%;border-radius:15px;margin-bottom:10px}
.song-card-title{font-size:12px;font-weight:600}
.song-card-artist{font-size:10px;color:#94a3b8}
.song-card:hover{
transform:scale(1.05);
}
.active{outline:2px solid #22d3ee}
@media(max-width:900px){.player-layout{grid-template-columns:1fr}}
</style></head>
<body> 

<video autoplay muted loop playsinline class="bg-anime" id="bgVideo">
<source src="anime.mp4" type="video/mp4">
</video>

<div class="app">
<div class="header"><h1>My Music</h1></div>
<div class="player-layout"><div class="player-card" id="playerCard">
    <audio id="audio" preload="metadata"></audio>
    <img id="cover" class="cover" src="https://via.placeholder.com/600x600?text=Loading">
    <div id="title" class="song-title">Pilih Lagu</div>
    <div id="artist" class="song-artist">-</div><div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button class="play-btn" onclick="togglePlay()" id="playBtn">▶</button>
    <button onclick="nextSong()">⏭</button>
</div>

<div class="time-display">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
</div>

<div class="progress"><div id="progressBar" class="progress-bar"></div></div>
<div id="lyrics" class="lyrics-box">Lirik akan muncul di sini...</div>

</div><div id="playlist" class="playlist"></div>
</div>
</div> 
<script>
const audio=document.getElementById("audio");
const cover=document.getElementById("cover");
const titleEl=document.getElementById("title");
const artistEl=document.getElementById("artist");
const lyricsEl=document.getElementById("lyrics");
const playlistEl=document.getElementById("playlist");
const progressBar=document.getElementById("progressBar");
const currentTimeEl=document.getElementById("currentTime");
const durationEl=document.getElementById("duration");
const playBtn=document.getElementById("playBtn");
const playerCard=document.getElementById("playerCard");

const playlist=[
"About-You-—-The-1975.mp3",
"Line-Without-A-Hook-—-Ricky-Montgomery.mp3",
"Hapus-Aku-—-Nidji.mp3",
"A-Little-Piece-Of-Heaven-—-Avenged-Sevenfold.mp3",
"Wanita-Masih-Banyak-—-Stand-Here-Alone.mp3",
"Jadi-Milikku-—-Missing-Madeline.mp3",
"Takkan-Menyerah-—-Missing-Madeline.mp3",
"Akhir-Tak-Bahagia-—-Misellia.mp3",
"Bergema-Sampai-Selamanya-—-Nadhif-Basalamah.mp3",
"Ribuan-Memori-—-Lomba-Sihir.mp3",
"Take-Me-Home-Country-Roads-—-John-Denver.mp3",
"Everything-U-Are-—-Hindia.mp3",
"Secukupnya-—-Hindia.mp3",
"Berdansalah-—-Hindia.mp3",
"Ramai-Sepi-Bersama-—-Hindia.mp3",
"December-—-Neck-Deep.mp3",
"Wish-You-Were-Here-—-Neck-Deep.mp3",
"Tarot-—-.Feast.mp3",
"O,Tuan-—-.Feast.mp3",
"Nina-—-.Feast.mp3",
"Memori-Baik-—-Sheila-On-7.mp3",
"Young-Black-&-Rich-—-Melly-Mike.mp3",
"Payphone-—-Maroon-5,-Wiz-Khalifa.mp3",
"The-Winner-Takes-It-All-—-ABBA.mp3",
"Ada-Titik-Titik-Di-Ujung-Doa-—-Sal-Priadi.mp3",
"I-Thought-I-Saw-Your-Face-Today-—-She-&-Him.mp3",
"Bahagia-Lagi-—-Piche-Kota.mp3",
"Shower-—-Becky-G.mp3"
];

let currentIndex=0;

function parseName(file){const name=file.replace(".mp3","");const parts=name.split("—-");return{title:parts[0].replace(/-/g," "),artist:parts[1]?parts[1].replace(/-/g," "):""};}

async function getCover(title,artist){try{const query=encodeURIComponent(title+" "+artist);const res=await fetch(`https://itunes.apple.com/search?term=${query}&entity=song&limit=1`);const data=await res.json();if(data.results.length>0)return data.results[0].artworkUrl100.replace("100x100","600x600");}catch{}return"https://via.placeholder.com/600x600?text=No+Cover";}

async function getLyrics(title,artist){try{const cleanTitle=title.replace(/[^\\w\\s]/gi,"");const cleanArtist=artist.replace(/[^\\w\\s]/gi,"");const res=await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(cleanArtist)}/${encodeURIComponent(cleanTitle)}`);if(res.ok){const data=await res.json();if(data.lyrics)return data.lyrics;}}catch{}return"Lirik tidak ditemukan 😢";}

function formatTime(sec){if(!sec||isNaN(sec))return"0:00";const m=Math.floor(sec/60);const s=Math.floor(sec%60);return m+":"+(s<10?"0":"")+s;}

async function loadSong(index){
    currentIndex=index;
    const file=playlist[index];
    audio.src=file;
    audio.load();

    const info=parseName(file);
    titleEl.textContent=info.title;
    artistEl.textContent=info.artist;
    lyricsEl.textContent="Memuat lirik...";

    cover.src=await getCover(info.title,info.artist);
    lyricsEl.textContent=await getLyrics(info.title,info.artist);

    audio.play();
    playBtn.textContent="⏸";

    playerCard.scrollIntoView({behavior:"smooth"});

    updateActive();
}

function togglePlay(){

if(audio.paused){

audio.play();
bgVideo.muted = true; // lagu play → bg mute
playBtn.textContent="⏸";

}else{

audio.pause();
bgVideo.muted = false; // lagu pause → bg ada suara
playBtn.textContent="▶";

}

}
function nextSong(){currentIndex=(currentIndex+1)%playlist.length;loadSong(currentIndex);} 
function prevSong(){currentIndex=(currentIndex-1+playlist.length)%playlist.length;loadSong(currentIndex);} 

function updateActive(){document.querySelectorAll('.song-card').forEach((el,i)=>el.classList.toggle('active',i===currentIndex));}

audio.addEventListener("loadedmetadata",()=>{durationEl.textContent=formatTime(audio.duration);});
audio.addEventListener("timeupdate",()=>{if(audio.duration){progressBar.style.width=(audio.currentTime/audio.duration)*100+"%";currentTimeEl.textContent=formatTime(audio.currentTime);}});
audio.addEventListener("ended",nextSong);

playlist.forEach((song,i)=>{const info=parseName(song);const card=document.createElement("div");card.className="song-card";card.innerHTML=`<img src=\"https://via.placeholder.com/300x300?text=Loading\"><div class=\"song-card-title\">${info.title}</div><div class=\"song-card-artist\">${info.artist}</div>`;getCover(info.title,info.artist).then(url=>card.querySelector("img").src=url);card.onclick=()=>loadSong(i);playlistEl.appendChild(card);});
const bgVideo = document.getElementById("bgVideo");

document.body.addEventListener("click", function(){
bgVideo.muted = false;
bgVideo.play();
}, {once:true});

</script>
</body>
</html>
